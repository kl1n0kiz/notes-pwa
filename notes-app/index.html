<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

 
  <link rel="manifest" href="/manifest.json">

 
  <meta name="mobile-web-app-capable" content="yes">

 
  <meta name="theme-color" content="#4285f4">


  <link rel="apple-touch-icon" href="/icons/favicon-128x128.png">


  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>Заметки (13-14)</title>
  <link rel="stylesheet" href="https://unpkg.com/chota@latest">
  <link rel="icon" href="icons/favicon.ico" type="image/x-icon">

  <style>
    body { max-width: 600px; margin: 0 auto; padding: 20px; }
    #notes-list { list-style: none; padding: 0; margin-top: 20px; }
    #notes-list li {
      background: #f0f4ff;
      border-left: 4px solid #4285f4;
      padding: 10px 14px;
      margin-bottom: 8px;
      border-radius: 4px;
    }
    .offline-badge {
      display: none;
      background: #ff9800;
      color: white;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.85em;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h2>📝 Мои заметки</h2>
  <div class="offline-badge" id="offline-badge">Офлайн-режим</div>

  <form id="note-form" class="row">
    <input class="col-9" type="text" id="note-input"
           placeholder="Введите заметку" required>
    <button class="col-3 button primary" type="submit">Добавить</button>
  </form>

  <ul id="notes-list"></ul>

  <script src="app.js"></script>
</body>
</html>
